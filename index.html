<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Guide</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f2f2f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            font-size: 3em;
            color: #222;
            text-align: center;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .audio-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #0077cc;
            color: white;
            text-decoration: none;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: background-color 0.3s, transform 0.2s;
        }

        .audio-button:hover {
            background-color: #005fa3;
            transform: scale(1.05);
        }

        .audio-img {
            margin-top: 30px;
            max-width: 80%;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <h1>Audio Guide</h1>

    <a class="audio-button" href="https://drive.google.com/file/d/1dSjO6mHMKSOQD0ghkdVPPuRr3Uhu-inV/view?usp=sharing" target="_blank">
        Listen Now
    </a>

    <img class="audio-img" src="https://europeforvisitors.com/venice/images/actv/s-marta-325-4099133.jpg" alt="Santa Marta Vaporetto Stop">

</body>
</html>
